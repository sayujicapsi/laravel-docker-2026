services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - app_data:/var/www/html
      - storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      # Point at the host machine's MySQL instead of a container.
      # host.docker.internal resolves to the host via the host-gateway mapping below.
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      # Pull-at-startup: the entrypoint syncs the served code to this branch on
      # every boot (no image rebuild needed to deploy a new commit).
      GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/sayujicapsi/laravel-docker-2026.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      # Set GIT_TOKEN (e.g. a GitHub PAT / fine-grained token) only if the repo
      # is private. Leave empty for a public repo.
      GIT_TOKEN: ${GIT_TOKEN:-}
      # Rebuild front-end assets at startup (set false to use the baked assets).
      BUILD_ASSETS: ${BUILD_ASSETS:-true}
      # Run `php artisan migrate --force` at startup.
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    extra_hosts:
      # Required on Linux so host.docker.internal resolves to the host.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # php-fpm only starts once the entrypoint has finished syncing + building,
      # so this doubles as a "startup complete" signal for nginx to wait on.
      test: ["CMD-SHELL", "pgrep php-fpm >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - app_data:/var/www/html:ro
      - storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: host.docker.internal
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # The containerized MySQL is disabled in favour of the host machine's MySQL
  # (see DB_HOST: host.docker.internal above). To switch back, uncomment this
  # service, restore depends_on/DB_HOST: db on app + phpmyadmin, and re-enable
  # the db_data volume below.
  # db:
  #   image: mysql:8.0
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: ${DB_DATABASE:-laravel}
  #     MYSQL_USER: ${DB_USERNAME:-laravel}
  #     MYSQL_PASSWORD: ${DB_PASSWORD}
  #     MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
  #   volumes:
  #     - db_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  # db_data:   # re-enable together with the db service above
  storage:
  app_data:
