services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - app_data:/var/www/html
      - storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      # Point at the host machine's MySQL instead of a container.
      # host.docker.internal resolves to the host via the host-gateway mapping below.
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    extra_hosts:
      # Required on Linux so host.docker.internal resolves to the host.
      - "host.docker.internal:host-gateway"

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - app_data:/var/www/html:ro
      - storage:/var/www/html/storage:ro
    depends_on:
      - app

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: host.docker.internal
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # The containerized MySQL is disabled in favour of the host machine's MySQL
  # (see DB_HOST: host.docker.internal above). To switch back, uncomment this
  # service, restore depends_on/DB_HOST: db on app + phpmyadmin, and re-enable
  # the db_data volume below.
  # db:
  #   image: mysql:8.0
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: ${DB_DATABASE:-laravel}
  #     MYSQL_USER: ${DB_USERNAME:-laravel}
  #     MYSQL_PASSWORD: ${DB_PASSWORD}
  #     MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
  #   volumes:
  #     - db_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  # db_data:   # re-enable together with the db service above
  storage:
  app_data:
